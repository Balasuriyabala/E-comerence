apiVersion: apps/v1 
kind: Deployment
metadata: 
  name: backend 
  namespace: ttl-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend 

    spec:
      containers:
        - name: backend
          image: balasuriya/backend
          imagePullPolicy: Always
          ports:
            - containerPort: 8001

          envFrom:
            - configMapRef:
                name: backend-config

            - secretRef:
               name: backend-secret

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
